<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo | Alpine</title>
    <!-- Alpine JS  -->
    <script src="//unpkg.com/alpinejs" defer></script>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </style>

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <!-- Type js -->
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

    <!-- Short js -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js"
      integrity="sha512-csIng5zcB+XpulRUa+ev1zKo7zRNGpEaVfNB9On1no9KYTEY/rLGAEEpvgdw6nim1WdTuihZY1eqZ31K7/fZjw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <!-- notyf js (css) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css" />

    <!-- Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />

    <style>
      * {
        font-family: 'Google Sans', sans-serif;
      }

      .short_active {
        border: 2px dashed rgba(128, 128, 128, 0.43);
      }
    </style>

  </head>
  <body x-data="Todos" class="w-full min-h-screen flex flex-col px-30 py-15 gap-5 transition duration-700" :class="{'bg-linear-to-r from-gray-900 via-gray-900 to-gray-800':darkMode,'bg-linear-to-r from-gray-100 to-gray-50':!darkMode}"> 
    <div class="todo_form flex flex-col rounded-lg shadow-md gap-3 px-5 py-3 transition duration-700"
      :class="{'bg-gray-800':darkMode,'bg-white':!darkMode}"
    >
      <div class="main_title mb-3 flex justify-between items-center">
        <h1 class="text-purple-500 text-3xl">Alpine Todo</h1>

        <div class="theme text-xs flex gap-2">
          <button class="rounded-lg text-purple-500 transition cursor-pointer px-2 py-1 duration-700"
            :class="darkMode ? 'bg-gray-900 text-purple-500 hover:bg-gray-700' : 'bg-gray-100 hover:bg-purple-100'"
            @click="darkMode = !darkMode"
            x-text="darkMode ? 'terang' : 'gelap'"
          ></button>
        </div>
      </div>

      <div class="flex justify-end gap-2 w-full">
        <input
          type="text"
          :placeholder="errors.todo ? 'Aktifitas tidak boleh kosong' : 'Tambah aktifitas ...'"
          x-model="todo"
          class="px-3 py-2 rounded-lg border placeholder:text-purple-300 outline-none transition focus:ring-3 text-purple-500 w-1/2"
          x-ref="todo"
          :class="errors.todo ? 'border-red-500 placeholder:text-red-300 ring-red-500/20' : 'border-purple-500 placeholder:text-purple-300 ring-purple-500/20'"
        />
        <button
          class="px-4 py-2 bg-purple-500 font-bold hover:bg-purple-600 rounded-lg outline-none focus:ring-3 ring-purple-500/20 cursor-pointer transition duration-700"
          @click="add()"
          x-text="edit_id ? 'Edit' : '+'"
          :class="darkMode ? 'text-gray-800' : 'text-white' "
        ></button>
      </div>

      <div class="justify-between flex gap-2 mt-2">
        <div class="filter gap-2">
          <button
            class="text-xs px-2 py-1 rounded-lg transition cursor-pointer outline-none focus:ring-3 ring-purple-500/20"
            @click="filter = 'all';setFilter('all')"
            :class="filter == 'all' ? (darkMode ? 'bg-purple-500 text-gray-800 hover:bg-purple-600' : 'bg-purple-500 text-white hover:bg-purple-600'):(darkMode ? 'text-gray-400 bg-gray-900 hover:bg-gray-700' : 'text-gray-500 bg-gray-100 hover:bg-gray-200')"
            x-text="'All ('+backup_todos.length+')'"  
          >
            All
          </button>
          <button
            class="text-xs px-2 py-1 rounded-lg transition cursor-pointer outline-none focus:ring-3 ring-emerald-500/20"
            @click="filter = 'completed';setFilter('completed')"
            :class="filter == 'completed' ? (darkMode ? 'bg-emerald-500 text-gray-800 hover:bg-emerald-600' : 'bg-emerald-500 text-white hover:bg-emerald-600'):(darkMode ? 'text-gray-400 bg-gray-900 hover:bg-gray-700' : 'text-gray-500 bg-gray-100 hover:bg-gray-200')" 
            x-text="'Completed'"
          >
            
          </button>
          <button
            class="text-xs px-2 py-1 rounded-lg transition cursor-pointer outline-none focus:ring-3 ring-purple-500/20"
            @click="filter = 'pending';setFilter('pending')"
            :class="filter == 'pending' ? (darkMode ? 'bg-purple-500 text-gray-800 hover:bg-purple-600' : 'bg-purple-500 text-white hover:bg-purple-600'):(darkMode ? 'text-gray-400 bg-gray-900 hover:bg-gray-700' : 'text-gray-500 bg-gray-100 hover:bg-gray-200')"
            x-text="'Pending'"         
          >
            
          </button>
        </div>

        <div class="flex gap-2">
          <button
            class="text-xs px-2 py-1 rounded-lg transition cursor-pointer outline-none focus:ring-3 ring-purple-500/20"
            :class="divide == 2 ? (darkMode ? 'bg-purple-500 text-gray-800 hover:bg-purple-600' : 'bg-purple-500 text-white hover:bg-purple-600'):(darkMode ? 'bg-gray-900 text-gray-400 hover:bg-gray-700' : 'bg-gray-100 text-gray-400 hover:bg-gray-200')"  
            @click="divide = 2"
          >
            /2
          </button>
          <button
            class="text-xs px-2 py-1 rounded-lg transition cursor-pointer outline-none focus:ring-3 ring-purple-500/20"
            :class="divide == 3 ? (darkMode ? 'bg-purple-500 text-gray-800 hover:bg-purple-600' : 'bg-purple-500 text-white hover:bg-purple-600'):(darkMode ? 'bg-gray-900 text-gray-400 hover:bg-gray-700' : 'bg-gray-100 text-gray-400 hover:bg-gray-200')"  
            @click="divide = 3"
          >
            /3
          </button>
        </div>
      </div>
    </div>

    <div class="todo_list flex gap-3 flex-col p-2 shadow-md rounded-lg px-5 py-3 transition duration-700"
    :class="{'bg-gray-800':darkMode,'bg-white':!darkMode}"
    >
      <h3 class="text-xl text-purple-500">Daftar Aktifitas</h3>

      <div class="grid gap-2 mt-2 pb-4" :class="divide == 2 ? 'grid-cols-2' : 'grid-cols-3'" id="todo_list">
        <template x-for="(task,index) in todos" :key="task.id">

          <div x-transition 
          class="todo_card flex justify-between border px-4 py-2 rounded-lg group transition duration-700"
          
          :class="task.is_completed ? (darkMode ? 'border-emerald-400 hover:border-emerald-500 bg-gray-800' : 'border-emerald-400 hover:border-emerald-500 bg-white') : (darkMode ? 'border-purple-400 hover:border-purple-500 bg-gray-800' : 'border-purple-400 hover:border-purple-500 bg-white')"
          >

            <p x-text="task.task" @click.stop="todo = task.task;edit_id = task.id" :class="task.is_completed ? 'text-emerald-500' : 'text-purple-500'"></p>

            <div class="flex flex-col gap-2 justify-between">
              <button class="text-lg opacity-0 text-gray-400 cursor-pointer transition hover:text-gray-700 outline-none rounded-lg focus:ring-2 ring-purple-500/20 group-hover:opacity-100" @click="erase(task.id)">&Cross;</button>
              <div class="flex gap-2">
                <template x-if="edit_id == task.id">
                  <button @click="cancelEdit()" x-text="'batal edit'" class="text-xs rounded-lg px-2 py-1 cursor-pointer transition outline-none focus:ring-3'"
                    :class="darkMode ? 'text-gray-500 bg-gray-900 hover:bg-gray-700' : 'text-gray-500 bg-gray-100 hover:bg-gray-200' "
                  ></button>
                </template>
                <button
                  @click="toggle(task.id)"
                  x-text="task.is_completed ? 'selesai' : 'aktif'"
                  class="text-xs rounded-lg px-2 py-1 cursor-pointer transition outline-none focus:ring-3"


                  :class="task.is_completed ? (darkMode ? 'bg-emerald-500 hover:bg-emerald-600 ring-emerald-500/20 text-gray-800' : 'bg-emerald-500 hover:bg-emerald-600 ring-emerald-500/20 text-white'):(darkMode ? 'bg-purple-500 hover:bg-purple-600 ring-purple-500/20 text-gray-800' : 'bg-purple-500 hover:bg-purple-600 ring-purple-500/20 text-white')"
                ></button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Notyf JS -->
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>

    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.data('Todos', () => ({
          todo: '',
          edit_id: '',
          divide: 3,
          darkMode:localStorage.getItem('theme') === 'true',
          is_loading: false,
          filter: 'all',
          todos: [],
          backup_todos: [],
          errors: {},

          // mount
          init() {
            if (localStorage.getItem('todos')) {
              this.todos = JSON.parse(localStorage.getItem('todos'));
              this.backup_todos = JSON.parse(localStorage.getItem('todos'));
            } // jika storageada todos, maka ambil

            this.$watch('todos', (val) => {
              localStorage.setItem('todos', JSON.stringify(this.todos));
            }); // jika this.todos ada perubahan, maka simpan di lokal storage

            // layout
            if (localStorage.getItem('layout')) {
              this.divide = localStorage.getItem('layout');
            } // siapkan layout grid
            this.$watch('divide', (val) => {
              localStorage.setItem('layout', val);
            }); // atur layout grid dan simpan

            // dark mode
            this.$watch('darkMode',(val)=>{
              localStorage.setItem('theme',val);
            });

            // focus input
            this.$nextTick(() => {
              this.$refs.todo.focus();
            }); // focus pada input todo ketika halaman pertama kali dimuat
          },

          // reset from
          resetForm() {
            this.edit_id = '';
            this.todo = '';
            this.is_loading = false;
            this.errors = {};
          },

          // tambah
          add() {
            if (!this.validate()) {
              notyf.error('Aktifitas tidak boleh kosong!');
              return;
            }

            this.is_loading = true;

            if (this.edit_id) {
              let item = this.getItem(this.edit_id);
              let index = this.todos.indexOf(item);
              this.todos[index].task = this.todo;
              this.backup_todos[index].task = this.todo;
              this.resetForm();
              notyf.success('Aktifitas berhasil di edit!');
              return;
            }

            this.todos.push({
              id: (Math.random() * 10) / 2.5,
              task: this.todo,
              is_completed: false,
            });
            notyf.success('Aktifitas berhasil ditambahkan!');
            this.resetForm();

          },

          // get id
          getItem(id) {
            let [item] = this.todos.filter((val) => val.id == id);
            return item;
          },

          // hapus
          erase(id) {
            let item = this.getItem(id);
            item = this.todos.indexOf(item); // cari index nya
            this.todos.splice(item, 1); // hapus
            this.backup_todos.splice(item, 1); // hapus
            notyf.success('Aktifitas berhasil di hapus!'); // notifikasi
          },

          // toggle
          toggle(id) {
            let item = this.getItem(id);
            item.is_completed = !item.is_completed;
            let index = this.todos.indexOf(item);
            this.todos[index] = item;
            notyf.success('Aktifitas berhasil di update!'); // notifikasi
          },

          // validasi
          validate() {
            if (!this.todo.trim()) {
              this.errors.todo = 'Aktifitas tidak boleh kosong!';
              return false;
            }

            return true;
          },

          // cancel edit
          cancelEdit() {
            this.resetForm();
          },

          // set Filter
          setFilter(filter) {
            if (filter != 'all') {
              if (filter == 'pending') {
                this.filter = 'pending';
                this.todos = this.backup_todos.filter((val) => !val.is_completed);
              } else if (filter == 'completed') {
                this.filter = 'completed';
                this.todos = this.backup_todos.filter((val) => val.is_completed);
              }
            } else {
              this.todos = this.backup_todos;
            }
          },

        }));
      });

      // Sortable Js
      // Initialization
      const todo_list = document.getElementById('todo_list');
      const shortable_options = {
        group: 'todo_list_item',
        sort: true,
        ghostClass: 'short_active',
        onEnd: function (evt) {
          console.log('shortableJs : Reordered successfully!');
        },
        onUpdate: function (evt) {
          console.log(evt.clone);
          console.log(evt);
        },
      };
      const init_sortable = new Sortable(todo_list, shortable_options);

      // Notyf JS ( menginstansiasi )
      const notyf = new Notyf({
        duration: 4000,
        dismissible: true,
        position: {
          x: 'right',
          y: 'top',
        },
        types: [
          {
            type: 'warning',
            background: 'orange',
            duration: 4000,
            dismissible: true,
            icon: {
              className: 'material-icons',
              tagName: 'i',
              text: 'warning',
            },
          },
          {
            type: 'error',
            background: 'red',
            duration: 4000,
            dismissible: true,
          },
        ],
      });

      // Animate on Scroll
      AOS.init({
        duration: 500,
        once: true,
        mirror: true,
      });
    </script>
  </body>
</html>
